# Cron request issue form.
# The field labels MUST match what cronbot parses (Target repository, Workflow
# path, Cron expression, Justification).
name: Cron request
description: Request a scheduled (cron) workflow, owned and merged by cron-bot[bot].
title: "[cron] "
labels: ["cron-request"]
body:
  - type: markdown
    attributes:
      value: |
        Humans cannot merge cron changes directly (the identity-gate check
        blocks them). File this request; the cron-reviewers crew
        signs off; cron-bot lands the change so the bot is the durable owner.

        The owning team is fixed (cron-reviewers) and is not a field.
  - type: input
    id: target-repository
    attributes:
      label: Target repository
      description: owner/name of the repo that will run the cron.
      placeholder: octo-org/foo
    validations:
      required: true
  - type: input
    id: workflow-path
    attributes:
      label: Workflow path
      description: Path to the workflow file in that repo.
      placeholder: .github/workflows/stale.yml
    validations:
      required: true
  - type: input
    id: cron-expression
    attributes:
      label: Cron expression
      description: 5-field cron (UTC). The cadence is read from this — no separate field.
      placeholder: 0 9 * * *
    validations:
      required: true
  - type: textarea
    id: justification
    attributes:
      label: Justification
      description: Why this cron exists and what it does.
    validations:
      required: true
