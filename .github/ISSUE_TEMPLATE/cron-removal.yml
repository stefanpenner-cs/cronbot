# Cron removal issue form.
# The field labels MUST match what cronbot parses (Target repository, Workflow
# path, Reason).
name: Cron removal
description: Retire a managed (cron-bot[bot]-owned) scheduled workflow.
title: "[cron-remove] "
labels: ["cron-removal"]
body:
  - type: markdown
    attributes:
      value: |
        Stopping a scheduled job is a functional change, so removal goes through
        the same gate as adds:

        1. 🤖 Bot validates your removal request
        2. 👥 `cron-reviewers` signs off
        3. 🚀 `cron-bot[bot]` deletes the schedule and de-registers it
        4. ✅ Done — the cron is retired

        The identity gate blocks you from deleting the schedule yourself, so
        this form is the only way to retire a managed cron.

        Track the status via labels: `cron-valid` 🟢 → `cron-landing` 🟡 → `cron-landed` 🟢
  - type: input
    id: target-repository
    attributes:
      label: Target repository
      description: owner/name of the repo that runs the cron.
      placeholder: octo-org/foo
    validations:
      required: true
  - type: input
    id: workflow-path
    attributes:
      label: Workflow path
      description: Path to the workflow file whose schedule should be removed.
      placeholder: .github/workflows/stale.yml
    validations:
      required: true
  - type: textarea
    id: reason
    attributes:
      label: Reason
      description: Why this cron should be retired (kept for the audit trail).
    validations:
      required: true
