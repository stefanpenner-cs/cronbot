# Cron removal issue form.
# The field labels MUST match what cronbot parses (Target repository, Workflow
# path, Reason).
name: Cron removal
description: Retire a managed (cron-bot[bot]-owned) scheduled workflow.
title: "[cron-remove] "
labels: ["cron-removal"]
body:
  - type: markdown
    attributes:
      value: |
        Stopping a scheduled job is a functional change, so removal is reviewed
        the same way adds are: file this request; the cron-reviewers
        crew signs off; cron-bot deletes the schedule and de-registers the cron.

        Faster path for self-service: you may also just delete the `schedule:`
        cron from the workflow yourself (the identity gate allows removals), and
        the reconcile job will de-register it on its next run.
  - type: input
    id: target-repository
    attributes:
      label: Target repository
      description: owner/name of the repo that runs the cron.
      placeholder: octo-org/foo
    validations:
      required: true
  - type: input
    id: workflow-path
    attributes:
      label: Workflow path
      description: Path to the workflow file whose schedule should be removed.
      placeholder: .github/workflows/stale.yml
    validations:
      required: true
  - type: textarea
    id: reason
    attributes:
      label: Reason
      description: Why this cron should be retired (kept for the audit trail).
    validations:
      required: true
