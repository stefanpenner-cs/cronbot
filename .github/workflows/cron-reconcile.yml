# Reconcile: checks "deploying" PRs and completes them when the target PR merges.
#
# Every step is a single CLI call. No inline bash logic.
# The cron-reconcile CLI does: scan deployments → check target PRs → update status.
#
# Two modes (both controlled by the same CLI):
#   1. Scheduled (no webhook): hourly scan of deploying PRs
#   2. repository_dispatch (webhook mode): instant trigger from target repos
name: cron-reconcile

on:
  schedule:
    - cron: '0 * * * *'
  repository_dispatch:
    types: [cron-deploy-check]
  workflow_dispatch:
    inputs:
      pr_number:
        description: "Cronbot PR number to check (empty = scan all)"
        required: false

permissions:
  contents: read
  pull-requests: write
  deployments: write

jobs:
  reconcile:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/create-github-app-token@v1
        id: app-token
        if: vars.CRON_APP_ID != ''
        with:
          app-id: ${{ vars.CRON_APP_ID }}
          private-key: ${{ secrets.CRON_APP_KEY }}
          owner: ${{ github.repository_owner }}

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Reconcile (scheduled mode)
        if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
        run: go run ./cmd/cron-reconcile --repo "${{ github.repository }}" --output /tmp/reconcile-result.json
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token || secrets.DEPLOY_TOKEN || github.token }}

      - name: Reconcile (webhook mode)
        if: github.event_name == 'repository_dispatch'
        run: go run ./cmd/cron-reconcile --repo "${{ github.repository }}" --target-repo "${{ github.event.client_payload.target_repo }}" --target-pr "${{ github.event.client_payload.target_pr }}" --output /tmp/reconcile-result.json
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token || secrets.DEPLOY_TOKEN || github.token }}

      - name: Post reconcile result
        run: go run ./cmd/cron-postrecon --result /tmp/reconcile-result.json --repo "${{ github.repository }}"
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token || github.token }}