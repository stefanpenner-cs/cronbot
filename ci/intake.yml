# Cron intake workflow. Lives at .github/workflows/cron-intake.yml in the
# central cron-policy repo, where the registry (registry.json) also lives.
#
# Flow:
#   validate  : cronbot parses + checks the request, comments the plan (or errors)
#   provision : gated on the cron-approval Environment (crew sign-off), then
#               updates the registry and lands the change as the li-cron App.
#
# The provision job only runs after a required reviewer approves the deployment
# to the cron-approval environment (configure that environment's reviewers to
# the ci-workflows/ci-actions release crew).
name: cron-intake

on:
  issues:
    types: [opened, edited, labeled]

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  validate:
    if: contains(github.event.issue.labels.*.name, 'cron-request')
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
      BODY: ${{ github.event.issue.body }}
      ISSUE: ${{ github.event.issue.number }}
      URL: ${{ github.event.issue.html_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"
      - name: Validate request
        run: |
          set -uo pipefail
          printf '%s' "$BODY" > /tmp/issue.md
          if go run ./cmd/cronbot --issue-body /tmp/issue.md --request-url "$URL" > /tmp/plan.txt 2> /tmp/err.txt; then
            gh issue comment "$ISSUE" -F /tmp/plan.txt
          else
            { echo 'Cron request is invalid:'; echo; cat /tmp/err.txt; } > /tmp/msg.txt
            gh issue comment "$ISSUE" -F /tmp/msg.txt
            exit 1
          fi

  provision:
    needs: validate
    if: contains(github.event.issue.labels.*.name, 'cron-request')
    runs-on: ubuntu-latest
    # Crew sign-off: set this environment's required reviewers to the crew.
    environment: cron-approval
    env:
      BODY: ${{ github.event.issue.body }}
      ISSUE: ${{ github.event.issue.number }}
      URL: ${{ github.event.issue.html_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"

      # Mint a token for the li-cron App (the durable actor).
      - id: app
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ vars.LI_CRON_APP_ID }}
          private-key: ${{ secrets.LI_CRON_APP_KEY }}
          owner: ${{ github.repository_owner }}

      # Update the central registry (the catalog) and emit the plan.
      - name: Update registry
        run: |
          set -euo pipefail
          printf '%s' "$BODY" > /tmp/issue.md
          go run ./cmd/cronbot --issue-body /tmp/issue.md --request-url "$URL" \
            --registry registry.json --json-out /tmp/plan.json

      - name: Commit registry
        env:
          GH_TOKEN: ${{ steps.app.outputs.token }}
        run: |
          set -euo pipefail
          git config user.name  'li-cron[bot]'
          git config user.email '${{ vars.LI_CRON_APP_ID }}+li-cron[bot]@users.noreply.github.com'
          git add registry.json
          git commit -m "chore(cron): register $(jq -r .entry.repo /tmp/plan.json)::$(jq -r .entry.path /tmp/plan.json)" || echo "no registry change"
          git push

      # Land the cron in the target repo AS the li-cron App, so the bot is the
      # actor. Recommended sub-case: merge the developer's existing PR (squash),
      # which the identity-gate check is currently blocking. Fill REQUEST_PR in
      # the issue or wire your own resolution here.
      #
      # TODO(human-judgment): pick and implement ONE landing strategy:
      #   (a) merge the developer's referenced PR as the App (squash) — simplest,
      #       bot becomes the actor; OR
      #   (b) have the App author a managed workflow file with the schedule and
      #       merge it (needs the job body, not just the schedule).
      - name: Provision target repo (li-cron App)
        env:
          GH_TOKEN: ${{ steps.app.outputs.token }}
        run: |
          set -euo pipefail
          REPO=$(jq -r .repo /tmp/plan.json)
          BRANCH=$(jq -r .branch /tmp/plan.json)
          TITLE=$(jq -r .pr_title /tmp/plan.json)
          echo "Would land $BRANCH in $REPO and merge via squash as li-cron[bot]."
          echo "See TODO above — implement the chosen landing strategy."

      - name: Close issue
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh issue close "$ISSUE" -c "Provisioned by li-cron. Registry updated."
