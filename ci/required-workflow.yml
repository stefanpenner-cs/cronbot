# The enterprise REQUIRED check: the identity gate.
# Orgs register this as a required workflow (via a ruleset). GitHub injects it
# into every targeted repo's pull requests; the repo adds nothing.
#
# It fails any PR that adds or changes a cron value unless the PR author is
# cron-bot[bot]. Humans are forced through the cron-intake issue flow.
name: cron-policy

on:
  pull_request:

permissions:
  contents: read

jobs:
  identity-gate:
    runs-on: ubuntu-latest
    steps:
      # Need full history so we can diff the cron against the base ref.
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"
      - name: Cron identity gate
        env:
          ACTOR: ${{ github.event.pull_request.user.login }}
          BASE: ${{ github.base_ref }}
        run: |
          set -euo pipefail
          git fetch --quiet origin "$BASE"
          files=$(git diff --name-only "origin/$BASE...HEAD" -- \
            '.github/workflows/*.yml' '.github/workflows/*.yaml' \
            '**/.github/workflows/*.yml' '**/.github/workflows/*.yaml' || true)
          if [ -z "$files" ]; then
            echo "No workflow files changed."
            exit 0
          fi
          go run ./cmd/cronguard --actor "$ACTOR" --base "origin/$BASE" $files
