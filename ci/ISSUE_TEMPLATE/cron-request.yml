# Cron request issue form.
# Lives at .github/ISSUE_TEMPLATE/cron-request.yml in the central cron-policy repo.
# The field labels MUST match what cronbot parses (Target repository, Workflow
# path, Cron expression, Owner team, Cadence, Justification).
name: Cron request
description: Request a scheduled (cron) workflow, owned and merged by li-cron[bot].
title: "[cron] "
labels: ["cron-request"]
body:
  - type: markdown
    attributes:
      value: |
        Humans cannot merge cron changes directly (the identity-gate check
        blocks them). File this request; the platform crew signs off; li-cron
        lands the change so the bot is the durable owner.
  - type: input
    id: target-repository
    attributes:
      label: Target repository
      description: owner/name of the repo that will run the cron.
      placeholder: linkedin-actions/foo
    validations:
      required: true
  - type: input
    id: workflow-path
    attributes:
      label: Workflow path
      description: Path to the workflow file in that repo.
      placeholder: .github/workflows/nightly.yml
    validations:
      required: true
  - type: input
    id: cron-expression
    attributes:
      label: Cron expression
      description: 5-field cron (UTC).
      placeholder: 0 9 * * *
    validations:
      required: true
  - type: input
    id: owner-team
    attributes:
      label: Owner team
      description: The team accountable for this cron.
      placeholder: ci-cd-platform-reviewers
    validations:
      required: true
  - type: input
    id: cadence
    attributes:
      label: Cadence
      description: Human cadence, recorded in the registry for deadman.
      placeholder: daily
    validations:
      required: true
  - type: textarea
    id: justification
    attributes:
      label: Justification
      description: Why this cron exists and what it does.
    validations:
      required: true
